<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Arena Responsive Proof</title>
    <script>
      const publicSession = {
        sessionId: 's_smoke_replay',
        phase: 'referee_awards',
        round: 3,
        maxRounds: 7,
        expiresAt: '2026-06-03T20:00:00.000Z',
        arena: {
          name: 'Foundry Box',
          width: 26,
          height: 18,
          activeHazards: ['center saw', 'corner flippers'],
        },
        roles: {
          red: { role: 'red', claimed: true, submitted: true },
          blue: { role: 'blue', claimed: true, submitted: true },
        },
        replayAvailable: true,
        awardOptions: [],
        lastResult: {
          winner: 'blue',
          reason: 'Red drive disabled after rail trap',
          damage: { red: 64, blue: 31 },
          remainingHealth: { red: 0, blue: 46 },
        },
        eventLog: [
          { at: '14:03', type: 'session_created', message: 'Session s_smoke_replay created with seed aa-2042.' },
          { at: '14:07', type: 'role_claimed', message: 'Red and Blue roles are claimed.' },
          { at: '14:14', type: 'round_plan_submitted', message: 'Both round plans locked for round 3.' },
          { at: '14:15', type: 'combat_resolved', message: 'Combat resolved. Replay and referee awards are ready.' },
        ],
      }

      const replayPayload = {
        timeline: {
          round: 3,
          duration: 24,
          summary: 'Blue wins by disable after trapping Red against the west rail.',
          events: [
            { t: 0, type: 'spawn', bot: 'red', position: [-8, 0, 0], rotation: [0, 90, 0] },
            { t: 0, type: 'spawn', bot: 'blue', position: [8, 0, 0], rotation: [0, -90, 0] },
            { t: 3, type: 'move', bot: 'blue', from: [8, 0, 0], to: [3, 0, -2] },
            { t: 7, type: 'weapon_fire', bot: 'red', weaponSlot: 'weaponA' },
            { t: 10, type: 'impact', attacker: 'blue', defender: 'red', damage: 18, position: [-2, 0, -4] },
            { t: 13, type: 'hazard', hazard: 'center saw', bot: 'red', damage: 10, position: [-3, 0, -3] },
            { t: 16, type: 'damage', bot: 'red', amount: 16, remainingHealth: 22 },
            { t: 22, type: 'knockout', bot: 'red', cause: 'drive disabled' },
          ],
        },
        botBlueprints: {
          red: {
            name: 'Blackout Wedge',
            blocks: [
              { id: 'core', partId: 'Body_Square_Medium', position: [0, 0, 0], rotation: [0, 0, 0] },
              { id: 'spinner', partId: 'Weapon_Spinner_Large', position: [1, 0, 0], rotation: [0, 0, 0] },
            ],
            rationale: 'Protect the spinner long enough to trade once.',
          },
          blue: {
            name: 'Snare Account',
            blocks: [
              { id: 'core', partId: 'Body_Rectangle_Long', position: [0, 0, 0], rotation: [0, 0, 0] },
              { id: 'net', partId: 'Weapon_Net', position: [0, 0, 1], rotation: [0, 0, 0] },
            ],
            rationale: 'Keep distance, fire net, then push disabled drive.',
          },
        },
      }

      window.fetch = async (input) => {
        const url = String(input)
        if (url.includes('/sessions/s_smoke_replay/public')) {
          return new Response(JSON.stringify(publicSession), {
            headers: { 'content-type': 'application/json' },
            status: 200,
          })
        }

        if (url.includes('/sessions/s_smoke_replay/replay')) {
          return new Response(JSON.stringify(replayPayload), {
            headers: { 'content-type': 'application/json' },
            status: 200,
          })
        }

        return new Response(JSON.stringify({ code: 'NOT_FOUND', message: `Unhandled ${url}` }), {
          headers: { 'content-type': 'application/json' },
          status: 404,
        })
      }

      window.history.replaceState(null, '', `${window.location.pathname}?session=s_smoke_replay`)

      window.addEventListener('load', () => {
        window.setTimeout(() => {
          const clientWidth = document.documentElement.clientWidth
          const invite = Array.from(document.querySelectorAll('p'))
            .find((node) => node.textContent?.includes('Invite URLs are available only'))
          const replayFrame = document.querySelector('.referee-replay-frame')
          const replayShell = document.querySelector('.replay-shell')
          const timeline = document.querySelector('.timeline-list')
          const inviteRect = invite?.getBoundingClientRect()
          const frameRect = replayFrame?.getBoundingClientRect()
          const shellRect = replayShell?.getBoundingClientRect()
          const metrics = {
            clientWidth,
            scrollWidth: document.documentElement.scrollWidth,
            bodyScrollWidth: document.body.scrollWidth,
            noHorizontalOverflow: document.documentElement.scrollWidth <= clientWidth,
            inviteText: invite?.textContent ?? null,
            inviteRight: inviteRect ? Math.round(inviteRect.right) : null,
            inviteFullyVisible: inviteRect ? inviteRect.left >= 0 && inviteRect.right <= clientWidth : false,
            replayFrameRight: frameRect ? Math.round(frameRect.right) : null,
            replayFrameWidth: frameRect ? Math.round(frameRect.width) : null,
            replayFrameFits: frameRect ? frameRect.left >= 0 && frameRect.right <= clientWidth : false,
            replayShellWidth: shellRect ? Math.round(shellRect.width) : null,
            timelineClientWidth: timeline?.clientWidth ?? null,
            timelineScrollWidth: timeline?.scrollWidth ?? null,
          }
          const output = document.createElement('pre')
          output.id = 'responsive-metrics'
          output.textContent = JSON.stringify(metrics)
          document.body.appendChild(output)
        }, 4000)
      })
    </script>
    <script type="module" crossorigin src="../dist/assets/index-C8lrKZos.js"></script>
